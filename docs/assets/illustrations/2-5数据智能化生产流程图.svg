<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" width="100%" height="100%" style="background-color: #F8FAFC;">
  <defs>
    <!-- 阴影滤镜 -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow-heavy" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.15"/>
    </filter>
    
    <!-- 箭头定义 -->
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 2 L 8 5 L 0 8 Z" fill="#3B82F6"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 2 L 8 5 L 0 8 Z" fill="#10B981"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 2 L 8 5 L 0 8 Z" fill="#F59E0B"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 2 L 8 5 L 0 8 Z" fill="#EF4444"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 2 L 8 5 L 0 8 Z" fill="#64748B"/>
    </marker>

    <style>
      .title-main { font-size: 22px; font-weight: 900; fill: #0F172A; font-family: 'Helvetica Neue', 'PingFang SC', sans-serif; }
      .title-col { font-size: 14px; font-weight: bold; fill: #FFFFFF; font-family: 'Helvetica Neue', 'PingFang SC', sans-serif; }
      .box-title { font-size: 15px; font-weight: bold; fill: #1E293B; font-family: 'Helvetica Neue', 'PingFang SC', sans-serif; }
      .box-desc { font-size: 12px; fill: #64748B; font-family: 'Helvetica Neue', 'PingFang SC', sans-serif; }
      .flow-label { font-size: 12px; font-weight: bold; fill: #475569; font-family: 'Helvetica Neue', 'PingFang SC', sans-serif; }
      .warn-text { font-size: 13px; font-weight: bold; fill: #FFFFFF; font-family: 'Helvetica Neue', 'PingFang SC', sans-serif; }
      .feedback-text { font-size: 13px; font-weight: bold; fill: #B91C1C; font-family: 'Helvetica Neue', 'PingFang SC', sans-serif; }
    </style>
  </defs>

  <!-- 背景画布 -->
  <rect width="1200" height="650" fill="#F8FAFC" />

  <!-- 主标题 -->
  <text x="600" y="45" text-anchor="middle" class="title-main">图2-5 数据智能化生产与闭环审核管线流程</text>

  <!-- ================= 警告横幅 ================= -->
  <rect x="320" y="65" width="560" height="36" fill="#EF4444" rx="6" filter="url(#shadow-heavy)"/>
  <text x="600" y="89" text-anchor="middle" class="warn-text">⚠️ 严禁未经核验的LLM数据直接入库</text>

  <!-- ================= 列背景 ================= -->
  <!-- 第1列：智能产品研发 -->
  <rect x="30" y="120" width="320" height="490" fill="#F0F9FF" rx="12" stroke="#BAE6FD" stroke-width="2"/>
  <rect x="130" y="105" width="120" height="30" fill="#0284C7" rx="15" filter="url(#shadow)"/>
  <text x="190" y="125" text-anchor="middle" class="title-col">智能产品研发</text>

  <!-- 第2列：系统核心与自动校验 -->
  <rect x="380" y="120" width="420" height="490" fill="#F0FDF4" rx="12" stroke="#BBF7D0" stroke-width="2"/>
  <rect x="520" y="105" width="140" height="30" fill="#059669" rx="15" filter="url(#shadow)"/>
  <text x="590" y="125" text-anchor="middle" class="title-col">系统核心与自动校验</text>

  <!-- 第3列：人工复核与闭环 -->
  <rect x="830" y="120" width="340" height="490" fill="#FFF7ED" rx="12" stroke="#FED7AA" stroke-width="2"/>
  <rect x="925" y="105" width="150" height="30" fill="#EA580C" rx="15" filter="url(#shadow)"/>
  <text x="1000" y="125" text-anchor="middle" class="title-col">人工复核与闭环控制</text>


  <!-- ================= 第1列：节点 ================= -->
  <!-- 节点1 -->
  <g transform="translate(50, 150)">
    <rect width="280" height="60" fill="#FFFFFF" rx="8" filter="url(#shadow)" stroke="#93C5FD" stroke-width="1.5"/>
    <text x="140" y="28" text-anchor="middle" class="box-title">原始语料池输入</text>
    <text x="140" y="48" text-anchor="middle" class="box-desc">文献 / 菜谱 / 古籍</text>
  </g>
  <!-- 箭头 1->2 -->
  <path d="M 190 215 L 190 235" stroke="#3B82F6" stroke-width="2.5" marker-end="url(#arrow-blue)"/>

  <!-- 节点2 -->
  <g transform="translate(50, 240)">
    <rect width="280" height="50" fill="#FFFFFF" rx="8" filter="url(#shadow)" stroke="#93C5FD" stroke-width="1.5"/>
    <text x="140" y="30" text-anchor="middle" class="box-title">非结构化抽取</text>
  </g>
  <!-- 箭头 2->3 -->
  <path d="M 190 295 L 190 315" stroke="#3B82F6" stroke-width="2.5" marker-end="url(#arrow-blue)"/>

  <!-- 节点3 -->
  <g transform="translate(50, 320)">
    <rect width="280" height="50" fill="#FFFFFF" rx="8" filter="url(#shadow)" stroke="#93C5FD" stroke-width="1.5"/>
    <text x="140" y="30" text-anchor="middle" class="box-title">生成风味向量 / 实体</text>
  </g>
  <!-- 箭头 3->4 -->
  <path d="M 190 375 L 190 395" stroke="#3B82F6" stroke-width="2.5" marker-end="url(#arrow-blue)"/>

  <!-- 节点4 -->
  <g transform="translate(50, 400)">
    <rect width="280" height="50" fill="#FFFFFF" rx="8" filter="url(#shadow)" stroke="#93C5FD" stroke-width="1.5"/>
    <text x="140" y="30" text-anchor="middle" class="box-title">大语言模型辅助</text>
  </g>


  <!-- ================= 第2列：节点 ================= -->
  <!-- 节点5 -->
  <g transform="translate(450, 150)">
    <rect width="280" height="50" fill="#FFFFFF" rx="8" filter="url(#shadow)" stroke="#86EFAC" stroke-width="1.5"/>
    <text x="140" y="30" text-anchor="middle" class="box-title">生态区映射 / 坐标检查</text>
  </g>
  <!-- 箭头 5->6 -->
  <path d="M 590 205 L 590 225" stroke="#10B981" stroke-width="2.5" marker-end="url(#arrow-green)"/>

  <!-- 节点6 -->
  <g transform="translate(450, 230)">
    <rect width="280" height="50" fill="#FFFFFF" rx="8" filter="url(#shadow)" stroke="#86EFAC" stroke-width="1.5"/>
    <text x="140" y="30" text-anchor="middle" class="box-title">机器规范校验</text>
  </g>
  <!-- 箭头 6->7 -->
  <path d="M 590 285 L 590 305" stroke="#10B981" stroke-width="2.5" marker-end="url(#arrow-green)"/>

  <!-- 节点7 -->
  <g transform="translate(450, 310)">
    <rect width="280" height="50" fill="#FFFFFF" rx="8" filter="url(#shadow)" stroke="#86EFAC" stroke-width="1.5"/>
    <text x="140" y="30" text-anchor="middle" class="box-title">格式与规则校验</text>
  </g>
  <!-- 箭头 7->8 -->
  <path d="M 590 365 L 590 385" stroke="#10B981" stroke-width="2.5" marker-end="url(#arrow-green)"/>

  <!-- 节点8 -->
  <g transform="translate(450, 390)">
    <rect width="280" height="50" fill="#FFFFFF" rx="8" filter="url(#shadow)" stroke="#86EFAC" stroke-width="1.5"/>
    <text x="140" y="30" text-anchor="middle" class="box-title">系统核心数据库</text>
  </g>
  <!-- 箭头 8->9 -->
  <path d="M 590 445 L 590 465" stroke="#10B981" stroke-width="2.5" marker-end="url(#arrow-green)"/>

  <!-- 节点9 -->
  <g transform="translate(450, 470)">
    <rect width="280" height="50" fill="#FFFFFF" rx="8" filter="url(#shadow)" stroke="#86EFAC" stroke-width="1.5"/>
    <text x="140" y="30" text-anchor="middle" class="box-title">食材传播专题文件</text>
  </g>


  <!-- ================= 第3列：节点 ================= -->
  <!-- 节点10 -->
  <g transform="translate(860, 230)">
    <rect width="280" height="50" fill="#FFFFFF" rx="8" filter="url(#shadow)" stroke="#FDBA74" stroke-width="1.5"/>
    <text x="140" y="30" text-anchor="middle" class="box-title">需审与验证</text>
  </g>
  <!-- 箭头 10->11 -->
  <path d="M 1000 285 L 1000 315" stroke="#F59E0B" stroke-width="2.5" marker-end="url(#arrow-orange)"/>

  <!-- 节点11 -->
  <g transform="translate(860, 320)">
    <rect width="280" height="70" fill="#FFFFFF" rx="8" filter="url(#shadow)" stroke="#FDBA74" stroke-width="1.5"/>
    <text x="140" y="30" text-anchor="middle" class="box-title">人工复核与定级</text>
    <text x="140" y="52" text-anchor="middle" class="box-desc">判断争议 / 来源验证</text>
  </g>
  <!-- 箭头 11->12 -->
  <path d="M 1000 395 L 1000 425" stroke="#F59E0B" stroke-width="2.5" marker-end="url(#arrow-orange)"/>

  <!-- 节点12 -->
  <g transform="translate(860, 430)">
    <rect width="280" height="50" fill="#FFFFFF" rx="8" filter="url(#shadow)" stroke="#FDBA74" stroke-width="1.5"/>
    <text x="140" y="30" text-anchor="middle" class="box-title">专家人工控制点</text>
  </g>

  <!-- ================= 跨列连接线 ================= -->
  
  <!-- 连接 第1列(LLM辅助) 到 第2列(生态区映射) -->
  <!-- 从 x=330, y=425 到 x=450, y=175 -->
  <path d="M 330 425 C 390 425, 390 175, 445 175" fill="none" stroke="#6366F1" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#arrow-gray)"/>
  <rect x="380" y="285" width="70" height="20" fill="#F8FAFC" rx="4" stroke="#C7D2FE" stroke-width="1"/>
  <text x="415" y="300" text-anchor="middle" class="flow-label">自动流入</text>

  <!-- 连接 第2列(专题文件) 到 第3列(需审与验证) -->
  <!-- 从 x=730, y=495 到 x=860, y=255 -->
  <path d="M 730 495 C 790 495, 790 255, 855 255" fill="none" stroke="#6366F1" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#arrow-gray)"/>
  <rect x="780" y="365" width="70" height="20" fill="#F8FAFC" rx="4" stroke="#C7D2FE" stroke-width="1"/>
  <text x="815" y="380" text-anchor="middle" class="flow-label">待审队列</text>

  <!-- ================= 反馈闭环（红色打回流程） ================= -->
  <!-- 从 第3列(需审与验证) 右侧开始，向下，向左，回到 第1列(非结构化抽取) -->
  <!-- 路径：x=1140, y=255 -> x=1170 -> y=550 -> x=190 -> y=265 -->
  <path d="M 1140 255 L 1175 255 L 1175 550 L 190 550 L 190 275" fill="none" stroke="#EF4444" stroke-width="3" marker-end="url(#arrow-red)"/>
  
  <!-- 反馈标签背景 -->
  <rect x="1155" y="380" width="30" height="140" fill="#FEF2F2" rx="6" stroke="#FCA5A5" stroke-width="1.5"/>
  <!-- 反馈标签文字（垂直排列） -->
  <text x="1170" y="400" text-anchor="middle" class="feedback-text">审</text>
  <text x="1170" y="420" text-anchor="middle" class="feedback-text">核</text>
  <text x="1170" y="440" text-anchor="middle" class="feedback-text">不</text>
  <text x="1170" y="460" text-anchor="middle" class="feedback-text">通</text>
  <text x="1170" y="480" text-anchor="middle" class="feedback-text">过</text>
  
  <!-- 底部横向标签 -->
  <rect x="400" y="535" width="180" height="24" fill="#FEF2F2" rx="4" stroke="#FCA5A5" stroke-width="1"/>
  <text x="490" y="552" text-anchor="middle" class="feedback-text">⚠️ 标记待核验，打回重整</text>

</svg>