<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="100%" height="100%">
  <defs>
    <filter id="node-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#64748B" flood-opacity="0.3"/>
    </filter>
    <style>
      .sys-font { font-family: 'Arial', 'Microsoft YaHei', sans-serif; }
      .title { font-size: 22px; font-weight: bold; fill: #1E293B; }
      .node-text-main { font-size: 16px; font-weight: bold; fill: #FFFFFF; }
      .node-text-sub { font-size: 11px; fill: #F8FAFC; }
      .rel-label-text { font-size: 12px; font-weight: bold; fill: #334155; }
      .edge { fill: none; stroke: #94A3B8; stroke-width: 2.5; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#94A3B8"/>
    </marker>
  </defs>

  <rect width="1000" height="600" fill="#F8FAFC"/>
  <text x="500" y="40" text-anchor="middle" class="sys-font title">图 2-2 核心业务对象网络拓扑图</text>

  <!-- Edges (drawn first so they are behind nodes) -->
  <!-- Eco <-> Flavor -->
  <path d="M 750 420 C 750 300, 500 300, 500 300" class="edge" marker-start="url(#arrow)"/>
  <!-- Eco <-> Ingredient -->
  <path d="M 750 420 C 750 460, 250 460, 250 420" class="edge" stroke-dasharray="5,5"/>
  <!-- Flavor <-> Ingredient -->
  <path d="M 500 300 C 500 300, 250 300, 250 420" class="edge" marker-end="url(#arrow)"/>
  <!-- Dispersal <-> Flavor (Concept mapping) -->
  <path d="M 250 150 C 500 150, 500 300, 500 300" class="edge" stroke-dasharray="3,3"/>
  <!-- Dispersal <-> Ingredient -->
  <path d="M 250 150 C 250 250, 250 420, 250 420" class="edge" marker-end="url(#arrow)"/>
  <!-- Dispersal <-> Chapter -->
  <path d="M 250 150 C 750 150, 750 150, 750 150" class="edge" marker-start="url(#arrow)"/>

  <!-- Relationship Labels (Pills) -->
  <g transform="translate(625, 300)">
    <rect x="-55" y="-12" width="110" height="24" fill="#FFFFFF" stroke="#CBD5E1" rx="12"/>
    <text x="0" y="4" text-anchor="middle" class="sys-font rel-label-text">环境孕育 (1:N)</text>
  </g>
  <g transform="translate(500, 460)">
    <rect x="-65" y="-12" width="130" height="24" fill="#FFFFFF" stroke="#CBD5E1" rx="12"/>
    <text x="0" y="4" text-anchor="middle" class="sys-font rel-label-text">原产地关联 (M:N)</text>
  </g>
  <g transform="translate(375, 360)">
    <rect x="-60" y="-12" width="120" height="24" fill="#FFFFFF" stroke="#CBD5E1" rx="12"/>
    <text x="0" y="4" text-anchor="middle" class="sys-font rel-label-text">配方连结 (M:N)</text>
  </g>
  <g transform="translate(250, 285)">
    <rect x="-60" y="-12" width="120" height="24" fill="#FFFFFF" stroke="#CBD5E1" rx="12"/>
    <text x="0" y="4" text-anchor="middle" class="sys-font rel-label-text">传播主题 (N:1)</text>
  </g>
  <g transform="translate(500, 150)">
    <rect x="-55" y="-12" width="110" height="24" fill="#FFFFFF" stroke="#CBD5E1" rx="12"/>
    <text x="0" y="4" text-anchor="middle" class="sys-font rel-label-text">章节路线 (1:N)</text>
  </g>

  <!-- Nodes -->
  <!-- Center: Flavor -->
  <g transform="translate(500, 300)">
    <rect x="-90" y="-35" width="180" height="70" fill="#2563EB" rx="10" filter="url(#node-shadow)"/>
    <text x="0" y="-5" text-anchor="middle" class="sys-font node-text-main">风味节点</text>
    <text x="0" y="15" text-anchor="middle" class="sys-font node-text-sub">flavor_genotype</text>
  </g>

  <!-- Bottom Right: Eco Unit -->
  <g transform="translate(750, 420)">
    <rect x="-90" y="-35" width="180" height="70" fill="#059669" rx="10" filter="url(#node-shadow)"/>
    <text x="0" y="-5" text-anchor="middle" class="sys-font node-text-main">生态地理单元</text>
    <text x="0" y="15" text-anchor="middle" class="sys-font node-text-sub">eco_geo_unit</text>
  </g>

  <!-- Bottom Left: Ingredient -->
  <g transform="translate(250, 420)">
    <rect x="-90" y="-35" width="180" height="70" fill="#D97706" rx="10" filter="url(#node-shadow)"/>
    <text x="0" y="-5" text-anchor="middle" class="sys-font node-text-main">食材</text>
    <text x="0" y="15" text-anchor="middle" class="sys-font node-text-sub">ingredient</text>
  </g>

  <!-- Top Left: Dispersal Event -->
  <g transform="translate(250, 150)">
    <rect x="-90" y="-35" width="180" height="70" fill="#7C3AED" rx="10" filter="url(#node-shadow)"/>
    <text x="0" y="-5" text-anchor="middle" class="sys-font node-text-main">传播事件</text>
    <text x="0" y="15" text-anchor="middle" class="sys-font node-text-sub">dispersal_event</text>
  </g>

  <!-- Top Right: Chapter -->
  <g transform="translate(750, 150)">
    <rect x="-90" y="-35" width="180" height="70" fill="#0891B2" rx="10" filter="url(#node-shadow)"/>
    <text x="0" y="-5" text-anchor="middle" class="sys-font node-text-main">叙事章节</text>
    <text x="0" y="15" text-anchor="middle" class="sys-font node-text-sub">chapter</text>
  </g>
</svg>