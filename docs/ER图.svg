<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1150 980" style="background-color: #fafaf8; font-family: 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif;">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.05"/>
    </filter>
  </defs>

  <!-- 标题 -->
  <text x="575" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#2c3e50" letter-spacing="1">寻味地理 · 数据实体关系图</text>
  <text x="575" y="65" text-anchor="middle" font-size="13" fill="#7f8c8d">信息工程法（IE Notation）—— 布局优化无重叠版</text>

  <!-- ==================== 连线与关系 (放于底层避免遮挡文字) ==================== -->

  <!-- R1：生态单元 —— 所在 —— 成品基因型 (1:N) -->
  <line x1="390" y1="200" x2="680" y2="200" stroke="#2c3e50" stroke-width="2.2"/>
  <!-- 1 端 (Eco) -->
  <line x1="398" y1="190" x2="398" y2="210" stroke="#2c3e50" stroke-width="2.5"/>
  <!-- N 端 (Genotype) Crow's foot -->
  <path d="M 670 195 L 680 200 L 670 205" fill="none" stroke="#2c3e50" stroke-width="2.2"/>
  <text x="535" y="185" text-anchor="middle" font-size="13" fill="#c2185b" font-weight="bold">所 在</text>
  <text x="535" y="218" text-anchor="middle" font-size="11" fill="#7f8c8d">1 生态单元 · N 成品</text>

  <!-- R5：传播事件 —— 起点/终点 —— 生态单元 (N:1) -->
  <line x1="235" y1="680" x2="235" y2="264" stroke="#2c3e50" stroke-width="2.2"/>
  <!-- 1 端 (Eco) -->
  <line x1="225" y1="272" x2="245" y2="272" stroke="#2c3e50" stroke-width="2.5"/>
  <!-- N 端 (Dispersal) Crow's foot -->
  <path d="M 230 670 L 235 680 L 240 670" fill="none" stroke="#2c3e50" stroke-width="2.2"/>
  <text x="245" y="470" font-size="13" fill="#5b9bd5" font-weight="bold">起点 / 终点</text>
  <text x="245" y="490" font-size="11" fill="#7f8c8d">N 事件 · 1 生态单元</text>

  <!-- R4：传播 —— 传播事件 到 原材料 (N:1) -->
  <line x1="430" y1="750" x2="680" y2="750" stroke="#2c3e50" stroke-width="2.2"/>
  <!-- 1 端 (Ingredient) -->
  <line x1="672" y1="740" x2="672" y2="760" stroke="#2c3e50" stroke-width="2.5"/>
  <!-- N 端 (Dispersal) Crow's foot -->
  <path d="M 440 745 L 430 750 L 440 755" fill="none" stroke="#2c3e50" stroke-width="2.2"/>
  <text x="555" y="740" text-anchor="middle" font-size="13" fill="#5b9bd5" font-weight="bold">传 播</text>
  <text x="555" y="768" text-anchor="middle" font-size="11" fill="#7f8c8d">N 事件 · 1 原料</text>

  <!-- R2：原材料 —— 原产于 —— 生态单元 (M:N, 正交路径绕开中心) -->
  <path d="M 680 720 L 465 720 L 465 230 L 390 230" fill="none" stroke="#2c3e50" stroke-width="2.2"/>
  <!-- M 端 (Ingredient) Crow's foot -->
  <path d="M 670 715 L 680 720 L 670 725" fill="none" stroke="#2c3e50" stroke-width="2.2"/>
  <!-- N 端 (Eco) Crow's foot -->
  <path d="M 400 225 L 390 230 L 400 235" fill="none" stroke="#2c3e50" stroke-width="2.2"/>
  <text x="475" y="470" font-size="13" fill="#d4a373" font-weight="bold">原产于</text>
  <text x="475" y="490" font-size="11" fill="#7f8c8d">M 原料 · N 生态单元</text>

  <!-- R3：成品基因型 —— 构成 —— 原材料 (M:N, 经 RecipeLink) -->
  <line x1="740" y1="274" x2="740" y2="400" stroke="#2c3e50" stroke-width="2.2"/>
  <line x1="740" y1="680" x2="740" y2="514" stroke="#2c3e50" stroke-width="2.2"/>
  <!-- 1 端 (Genotype) -->
  <line x1="730" y1="282" x2="750" y2="282" stroke="#2c3e50" stroke-width="2.5"/>
  <!-- M 端 (RecipeLink 上) -->
  <path d="M 735 390 L 740 400 L 745 390" fill="none" stroke="#2c3e50" stroke-width="2.2"/>
  <!-- 1 端 (Ingredient) -->
  <line x1="730" y1="672" x2="750" y2="672" stroke="#2c3e50" stroke-width="2.5"/>
  <!-- N 端 (RecipeLink 下) -->
  <path d="M 735 524 L 740 514 L 745 524" fill="none" stroke="#2c3e50" stroke-width="2.2"/>
  <text x="725" y="345" text-anchor="end" font-size="13" fill="#8e24aa" font-weight="bold">构 成</text>
  <text x="725" y="365" text-anchor="end" font-size="11" fill="#7f8c8d">M 成品 · N 原料</text>

  <!-- R6：基因溯源链 —— 溯源 —— 成品基因型 (M:N 自引用, 经 GenotypeLineage) -->
  <line x1="880" y1="274" x2="880" y2="400" stroke="#2c3e50" stroke-width="2.2"/>
  <line x1="940" y1="274" x2="940" y2="400" stroke="#2c3e50" stroke-width="2.2"/>
  <!-- 1 端 (Genotype Ancestor) -->
  <line x1="870" y1="282" x2="890" y2="282" stroke="#2c3e50" stroke-width="2.5"/>
  <!-- M 端 (Lineage Ancestor) -->
  <path d="M 875 390 L 880 400 L 885 390" fill="none" stroke="#2c3e50" stroke-width="2.2"/>
  <!-- 1 端 (Genotype Descendant) -->
  <line x1="930" y1="282" x2="950" y2="282" stroke="#2c3e50" stroke-width="2.5"/>
  <!-- N 端 (Lineage Descendant) -->
  <path d="M 935 390 L 940 400 L 945 390" fill="none" stroke="#2c3e50" stroke-width="2.2"/>
  <text x="960" y="345" font-size="13" fill="#00897b" font-weight="bold">溯 源</text>
  <text x="960" y="365" font-size="11" fill="#7f8c8d">M 祖先 · N 后代</text>
  <text x="880" y="310" text-anchor="end" font-size="10" fill="#2c3e50" font-style="italic">ancestor</text>
  <text x="950" y="310" text-anchor="start" font-size="10" fill="#2c3e50" font-style="italic">descendant</text>


  <!-- ==================== 左列：地理与事件 ==================== -->

  <!-- 实体 1：生态地理单元 -->
  <g transform="translate(80, 120)">
    <rect x="0" y="0" width="310" height="34" rx="6" fill="#4a7c59"/>
    <text x="155" y="23" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">生态地理单元 (EcoGeoUnit)</text>
    <rect x="0" y="34" width="310" height="110" fill="#f4f9f4" stroke="#4a7c59" stroke-width="1.8" filter="url(#shadow)"/>
    <line x1="0" y1="64" x2="310" y2="64" stroke="#4a7c59" stroke-width="1"/>
    <text x="16" y="54" font-size="12" font-weight="bold" fill="#b22222">▼ eco_id</text>
    <text x="100" y="54" font-size="11" fill="#b22222">CHAR(10) PK</text>
    <text x="16" y="78" font-size="12" fill="#2c3e50">name</text>
    <text x="100" y="78" font-size="11" fill="#555">VARCHAR</text>
    <text x="16" y="98" font-size="12" fill="#2c3e50">climate</text>
    <text x="100" y="98" font-size="11" fill="#555">JSONB</text>
    <text x="16" y="118" font-size="12" fill="#2c3e50">adjacent_ecos</text>
    <text x="100" y="118" font-size="11" fill="#555">TEXT[]</text>
  </g>

  <!-- 实体 4：传播事件 -->
  <g transform="translate(40, 680)">
    <rect x="0" y="0" width="390" height="34" rx="6" fill="#5b9bd5"/>
    <text x="195" y="23" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">传播事件 (DispersalEvent)</text>
    <rect x="0" y="34" width="390" height="120" fill="#e8f4fd" stroke="#5b9bd5" stroke-width="1.8" filter="url(#shadow)"/>
    <line x1="0" y1="64" x2="390" y2="64" stroke="#5b9bd5" stroke-width="1"/>
    <text x="16" y="54" font-size="12" font-weight="bold" fill="#b22222">▼ event_id</text>
    <text x="100" y="54" font-size="11" fill="#b22222">CHAR(12) PK</text>
    <text x="16" y="78" font-size="12" font-weight="bold" fill="#b22222"># ingredient_id</text>
    <text x="100" y="78" font-size="11" fill="#b22222">CHAR(8) FK</text>
    <text x="16" y="98" font-size="12" font-weight="bold" fill="#b22222"># from_eco_id</text>
    <text x="100" y="98" font-size="11" fill="#b22222">CHAR(10) FK</text>
    <text x="16" y="118" font-size="12" font-weight="bold" fill="#b22222"># to_eco_id</text>
    <text x="100" y="118" font-size="11" fill="#b22222">CHAR(10) FK</text>
    <text x="16" y="138" font-size="12" fill="#2c3e50">route_geom</text>
    <text x="100" y="138" font-size="11" fill="#555">GEOMETRY</text>
  </g>


  <!-- ==================== 右列：成品组分与基因溯源 ==================== -->

  <!-- 实体 3：成品风味基因型 -->
  <g transform="translate(680, 120)">
    <rect x="0" y="0" width="310" height="34" rx="6" fill="#c2185b"/>
    <text x="155" y="23" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">成品风味基因型 (FlavorGenotype)</text>
    <rect x="0" y="34" width="310" height="120" fill="#fce4ec" stroke="#c2185b" stroke-width="1.8" filter="url(#shadow)"/>
    <line x1="0" y1="64" x2="310" y2="64" stroke="#c2185b" stroke-width="1"/>
    <text x="16" y="54" font-size="12" font-weight="bold" fill="#b22222">▼ genotype_id</text>
    <text x="110" y="54" font-size="11" fill="#b22222">CHAR(12) PK</text>
    <text x="16" y="78" font-size="12" fill="#2c3e50">dish_name</text>
    <text x="110" y="78" font-size="11" fill="#555">VARCHAR(50)</text>
    <text x="16" y="98" font-size="12" fill="#2c3e50">category</text>
    <text x="110" y="98" font-size="11" fill="#555">VARCHAR(30)</text>
    <text x="16" y="118" font-size="12" fill="#2c3e50">genome_vector</text>
    <text x="110" y="118" font-size="11" fill="#555">JSONB</text>
    <text x="16" y="138" font-size="12" fill="#2c3e50">coordinates</text>
    <text x="110" y="138" font-size="11" fill="#555">POINT</text>
  </g>

  <!-- 关联实体 A：配方连结 -->
  <g transform="translate(500, 400)">
    <rect x="0" y="0" width="320" height="34" rx="6" fill="#8e24aa" opacity="0.85"/>
    <text x="160" y="23" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">配方连结 (RecipeLink)</text>
    <text x="310" y="13" font-size="10" text-anchor="end" fill="#8e24aa" font-style="italic">关联实体 (M:N)</text>
    <rect x="0" y="34" width="320" height="80" fill="#f3e5f5" stroke="#8e24aa" stroke-width="1.5" stroke-dasharray="6,3" filter="url(#shadow)"/>
    <text x="16" y="55" font-size="12" font-weight="bold" fill="#b22222">▼ genotype_id (PFK)</text>
    <text x="160" y="55" font-size="11" fill="#b22222">→ FlavorGenotype</text>
    <text x="16" y="75" font-size="12" font-weight="bold" fill="#b22222">▼ ingredient_id (PFK)</text>
    <text x="160" y="75" font-size="11" fill="#b22222">→ Ingredient</text>
    <text x="16" y="95" font-size="12" fill="#2c3e50">· role / importance / is_native</text>
  </g>

  <!-- 关联实体 B：基因溯源链 -->
  <g transform="translate(850, 400)">
    <rect x="0" y="0" width="280" height="34" rx="6" fill="#00897b" opacity="0.85"/>
    <text x="140" y="23" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">基因溯源链 (GenotypeLineage)</text>
    <text x="270" y="13" font-size="10" text-anchor="end" fill="#00897b" font-style="italic">自引用 (M:N)</text>
    <rect x="0" y="34" width="280" height="80" fill="#e0f2f1" stroke="#00897b" stroke-width="1.5" stroke-dasharray="6,3" filter="url(#shadow)"/>
    <text x="16" y="55" font-size="12" font-weight="bold" fill="#b22222">▼ ancestor_id (PFK)</text>
    <text x="160" y="55" font-size="11" fill="#b22222">→ Genotype</text>
    <text x="16" y="75" font-size="12" font-weight="bold" fill="#b22222">▼ descendant_id (PFK)</text>
    <text x="160" y="75" font-size="11" fill="#b22222">→ Genotype</text>
    <text x="16" y="95" font-size="12" fill="#2c3e50">· mutation_desc</text>
  </g>

  <!-- 实体 2：原材料 -->
  <g transform="translate(680, 680)">
    <rect x="0" y="0" width="310" height="34" rx="6" fill="#d4a373"/>
    <text x="155" y="23" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">原材料 (Ingredient)</text>
    <rect x="0" y="34" width="310" height="100" fill="#fef9e7" stroke="#d4a373" stroke-width="1.8" filter="url(#shadow)"/>
    <line x1="0" y1="64" x2="310" y2="64" stroke="#d4a373" stroke-width="1"/>
    <text x="16" y="54" font-size="12" font-weight="bold" fill="#b22222">▼ ingredient_id</text>
    <text x="110" y="54" font-size="11" fill="#b22222">CHAR(8) PK</text>
    <text x="16" y="78" font-size="12" fill="#2c3e50">name</text>
    <text x="110" y="78" font-size="11" fill="#555">VARCHAR(50)</text>
    <text x="16" y="98" font-size="12" fill="#2c3e50">type</text>
    <text x="110" y="98" font-size="11" fill="#555">ENUM</text>
    <text x="16" y="118" font-size="12" fill="#2c3e50">flavor_tags</text>
    <text x="110" y="118" font-size="11" fill="#555">TEXT[]</text>
  </g>

  <!-- ==================== 图例 ==================== -->
  <g transform="translate(50, 890)">
    <rect x="0" y="0" width="1050" height="50" rx="6" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
    
    <rect x="16" y="15" width="50" height="20" rx="3" fill="#4a7c59"/>
    <text x="41" y="29" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">实体</text>
    <text x="75" y="29" font-size="11" fill="#2c3e50">核心实体</text>

    <rect x="170" y="15" width="50" height="20" rx="3" fill="#8e24aa" opacity="0.7"/>
    <text x="195" y="29" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">关联</text>
    <text x="230" y="29" font-size="11" fill="#2c3e50">关联实体（M:N 关系提权）</text>

    <text x="440" y="29" font-size="11" fill="#b22222" font-weight="bold">▼ PK 主键</text>
    <text x="515" y="29" font-size="11" fill="#b22222" font-weight="bold"># FK 外键</text>
    <text x="585" y="29" font-size="11" fill="#b22222" font-weight="bold">▼ PFK 主键且外键</text>

    <!-- 一端图标 -->
    <line x1="710" y1="25" x2="740" y2="25" stroke="#2c3e50" stroke-width="2"/>
    <line x1="725" y1="18" x2="725" y2="32" stroke="#2c3e50" stroke-width="2.5"/>
    <text x="746" y="29" font-size="11" fill="#2c3e50">一</text>

    <!-- 多端图标 -->
    <line x1="780" y1="25" x2="810" y2="25" stroke="#2c3e50" stroke-width="2"/>
    <path d="M 800 18 L 810 25 L 800 32" fill="none" stroke="#2c3e50" stroke-width="2"/>
    <text x="816" y="29" font-size="11" fill="#2c3e50">多</text>

    <text x="860" y="29" font-size="11" fill="#7f8c8d">线段标注：动词语义 (基数说明)</text>
  </g>
</svg>
