<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#94A3B8" flood-opacity="0.2"/>
    </filter>
    <style>
      .sys-font { font-family: 'Arial', 'Microsoft YaHei', sans-serif; }
      .title { font-size: 22px; font-weight: bold; fill: #1E293B; }
      .main-node { font-size: 16px; font-weight: bold; fill: #FFFFFF; }
      .sub-title { font-size: 14px; font-weight: bold; fill: #1E293B; }
      .item-text { font-size: 12px; fill: #334155; }
      .line { fill: none; stroke: #94A3B8; stroke-width: 2; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1000" height="550" fill="#F8FAFC"/>
  <text x="500" y="40" text-anchor="middle" class="sys-font title">图 1-2 系统建设任务总览矩阵</text>

  <!-- Top Level Node -->
  <rect x="350" y="80" width="300" height="50" fill="#0F172A" rx="8" filter="url(#shadow)"/>
  <text x="500" y="110" text-anchor="middle" class="sys-font main-node">寻味地理 WebGIS 建设任务体系</text>

  <!-- Routing Lines -->
  <path d="M 500 130 L 500 160 L 140 160 L 140 180" class="line"/>
  <path d="M 500 160 L 320 160 L 320 180" class="line"/>
  <path d="M 500 160 L 500 180" class="line"/>
  <path d="M 500 160 L 680 160 L 680 180" class="line"/>
  <path d="M 500 160 L 860 160 L 860 180" class="line"/>

  <!-- Sub Modules Function to generate a column -->
  <!-- Col 1 -->
  <rect x="65" y="180" width="150" height="300" fill="#FFFFFF" rx="8" stroke="#E2E8F0" filter="url(#shadow)"/>
  <rect x="65" y="180" width="150" height="40" fill="#3B82F6" rx="8"/>
  <rect x="65" y="200" width="150" height="20" fill="#3B82F6"/>
  <text x="140" y="205" text-anchor="middle" class="sys-font sub-title" fill="#FFFFFF">1. 总体构架</text>
  
  <rect x="75" y="240" width="130" height="40" fill="#F1F5F9" rx="4"/>
  <text x="140" y="265" text-anchor="middle" class="sys-font item-text">B/S 前后端分离架构</text>
  <rect x="75" y="290" width="130" height="40" fill="#F1F5F9" rx="4"/>
  <text x="140" y="315" text-anchor="middle" class="sys-font item-text">多层接口安全策略</text>
  <rect x="75" y="340" width="130" height="40" fill="#F1F5F9" rx="4"/>
  <text x="140" y="365" text-anchor="middle" class="sys-font item-text">运行环境统一部署</text>

  <!-- Col 2 -->
  <rect x="245" y="180" width="150" height="300" fill="#FFFFFF" rx="8" stroke="#E2E8F0" filter="url(#shadow)"/>
  <rect x="245" y="180" width="150" height="40" fill="#059669" rx="8"/>
  <rect x="245" y="200" width="150" height="20" fill="#059669"/>
  <text x="320" y="205" text-anchor="middle" class="sys-font sub-title" fill="#FFFFFF">2. 空间数据库</text>
  
  <rect x="255" y="240" width="130" height="40" fill="#ECFDF5" rx="4"/>
  <text x="320" y="265" text-anchor="middle" class="sys-font item-text">PostGIS 环境搭建</text>
  <rect x="255" y="290" width="130" height="40" fill="#ECFDF5" rx="4"/>
  <text x="320" y="315" text-anchor="middle" class="sys-font item-text">核心业务实体建模</text>
  <rect x="255" y="340" width="130" height="40" fill="#ECFDF5" rx="4"/>
  <text x="320" y="365" text-anchor="middle" class="sys-font item-text">空间与关系型索引</text>

  <!-- Col 3 -->
  <rect x="425" y="180" width="150" height="300" fill="#FFFFFF" rx="8" stroke="#E2E8F0" filter="url(#shadow)"/>
  <rect x="425" y="180" width="150" height="40" fill="#D97706" rx="8"/>
  <rect x="425" y="200" width="150" height="20" fill="#D97706"/>
  <text x="500" y="205" text-anchor="middle" class="sys-font sub-title" fill="#FFFFFF">3. 数据管理后台</text>
  
  <rect x="435" y="240" width="130" height="40" fill="#FFFBEB" rx="4"/>
  <text x="500" y="265" text-anchor="middle" class="sys-font item-text">基础地理栅格化</text>
  <rect x="435" y="290" width="130" height="40" fill="#FFFBEB" rx="4"/>
  <text x="500" y="315" text-anchor="middle" class="sys-font item-text">生态区划清理加载</text>
  <rect x="435" y="340" width="130" height="40" fill="#FFFBEB" rx="4"/>
  <text x="500" y="365" text-anchor="middle" class="sys-font item-text">种子数据批次化导入</text>

  <!-- Col 4 -->
  <rect x="605" y="180" width="150" height="300" fill="#FFFFFF" rx="8" stroke="#E2E8F0" filter="url(#shadow)"/>
  <rect x="605" y="180" width="150" height="40" fill="#7C3AED" rx="8"/>
  <rect x="605" y="200" width="150" height="20" fill="#7C3AED"/>
  <text x="680" y="205" text-anchor="middle" class="sys-font sub-title" fill="#FFFFFF">4. WebGIS 应用</text>
  
  <rect x="615" y="240" width="130" height="40" fill="#F5F3FF" rx="4"/>
  <text x="680" y="265" text-anchor="middle" class="sys-font item-text">MapLibre 底图交互</text>
  <rect x="615" y="290" width="130" height="40" fill="#F5F3FF" rx="4"/>
  <text x="680" y="315" text-anchor="middle" class="sys-font item-text">Deck.gl 路线与流光</text>
  <rect x="615" y="340" width="130" height="40" fill="#F5F3FF" rx="4"/>
  <text x="680" y="365" text-anchor="middle" class="sys-font item-text">FastAPI 瓦片与服务</text>
  <rect x="615" y="390" width="130" height="40" fill="#F5F3FF" rx="4"/>
  <text x="680" y="415" text-anchor="middle" class="sys-font item-text">时空叙事等多维面板</text>

  <!-- Col 5 -->
  <rect x="785" y="180" width="150" height="300" fill="#FFFFFF" rx="8" stroke="#E2E8F0" filter="url(#shadow)"/>
  <rect x="785" y="180" width="150" height="40" fill="#475569" rx="8"/>
  <rect x="785" y="200" width="150" height="20" fill="#475569"/>
  <text x="860" y="205" text-anchor="middle" class="sys-font sub-title" fill="#FFFFFF">5. 智能生产管线</text>
  
  <rect x="795" y="240" width="130" height="40" fill="#F8FAFC" rx="4"/>
  <text x="860" y="265" text-anchor="middle" class="sys-font item-text">风味向量LLM抽取</text>
  <rect x="795" y="290" width="130" height="40" fill="#F8FAFC" rx="4"/>
  <text x="860" y="315" text-anchor="middle" class="sys-font item-text">传播事件结构化</text>
  <rect x="795" y="340" width="130" height="40" fill="#F8FAFC" rx="4"/>
  <text x="860" y="365" text-anchor="middle" class="sys-font item-text">来源标记与人工复核</text>

</svg>